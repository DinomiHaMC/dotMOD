name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: gradle/actions/wrapper-validation@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Test and build
        run: ./gradlew --no-daemon clean test build
      - name: Create checksum
        run: sha256sum build/libs/dotmod-2.0.0.jar > build/libs/dotmod-2.0.0.jar.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: dotmod-2.0.0
          path: |
            build/libs/dotmod-2.0.0.jar
            build/libs/dotmod-2.0.0.jar.sha256
          if-no-files-found: error
